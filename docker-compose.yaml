services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/scripts/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./api/scripts/seed.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro

  api:
    build:
      context: ./api
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/task_manager
      JWT_SECRET: development-secret
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      - db
    ports:
      - "4000:4000"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
